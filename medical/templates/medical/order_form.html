{% extends 'medical/base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<div class="page-header">
    <div class="page-title"><span>{{ title }}</span></div>
    <a href="{% url 'order_list' %}" class="btn btn-secondary">← Back</a>
</div>
<div class="card" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<ul style="list-style:none;color:#fca5a5;font-size:0.8rem;margin-top:0.3rem;">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
        </div>
        {% endfor %}
        <div style="margin-top:1.5rem;">
            <button type="submit" class="btn btn-primary">{{ button_text }}</button>
        </div>
    </form>
</div>
{% endblock %}

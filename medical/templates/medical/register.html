<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Coruscant Health</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .auth-box { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 480px; }
        .auth-logo { text-align: center; margin-bottom: 2rem; }
        .auth-logo h1 { font-size: 1.5rem; font-weight: 700; color: #60a5fa; }
        .auth-logo h1 span { color: #f472b6; }
        .auth-logo p { color: #64748b; font-size: 0.85rem; margin-top: 0.3rem; }
        h2 { font-size: 1.2rem; font-weight: 600; color: #f1f5f9; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.1rem; }
        label { display: block; color: #94a3b8; font-size: 0.82rem; margin-bottom: 0.4rem; font-weight: 500; }
        input, select { width: 100%; background: #0f1117; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; padding: 0.65rem 0.9rem; font-size: 0.9rem; transition: border-color 0.2s; }
        input:focus, select:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        select option { background: #1a1d2e; }
        .errorlist { list-style: none; color: #fca5a5; font-size: 0.8rem; margin-top: 0.3rem; }
        .btn { width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 0.7rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .auth-link { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: #64748b; }
        .auth-link a { color: #60a5fa; }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="auth-logo">
        <h1>⚕ Coruscant <span>Health</span></h1>
        <p>Medical Management System</p>
    </div>
    <h2>Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<ul class="errorlist">{% for e in field.errors %}<li>{{ e }}</li>{% endfor %}</ul>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn">Register</button>
    </form>
    <div class="auth-link">Already have an account? <a href="{% url 'login' %}">Login</a></div>
</div>
</body>
</html>
